name: Daily Sync

on:
  schedule:
    - cron: '0 2 * * *'  # 2:00 AM mỗi ngày
  workflow_dispatch:     

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Build and run Docker container
        run: |
          docker build -t optisigns-daily-sync .
          docker run --rm -e GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }} optisigns-daily-sync
